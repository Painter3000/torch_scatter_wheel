name: Build torch_scatter Wheel (torch 2.11.0 + CUDA 13.0 + Blackwell)

on:
  workflow_dispatch:
    inputs:
      scatter_ref:
        description: "pytorch_scatter branch / tag / commit (default: master)"
        required: false
        default: "master"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:13.0.1-devel-ubuntu22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      FORCE_CUDA: "1"
      # Nur Blackwell sm_120 – kein Multi-Arch, spart RAM und Zeit
      TORCH_CUDA_ARCH_LIST: "12.0"
      MAX_JOBS: "4"

    steps:
      - name: Install system packages
        run: |
          apt-get update -y
          apt-get install -y \
            python3.10 python3.10-dev python3-pip python3-distutils \
            git build-essential ninja-build
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1
          update-alternatives --install /usr/bin/python  python  /usr/bin/python3.10 1
          python --version
          nvcc --version

      - name: Upgrade pip and build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install PyTorch 2.11.0 + cu130
        run: |
          python -m pip install \
            torch==2.11.0 \
            --index-url https://download.pytorch.org/whl/cu130
          python -c "import torch; print('torch:', torch.__version__); print('CUDA:', torch.version.cuda)"

      - name: Clone pytorch_scatter
        run: |
          REF="${{ github.event.inputs.scatter_ref }}"
          REF="${REF:-master}"
          echo "Cloning pytorch_scatter @ $REF"
          git clone https://github.com/rusty1s/pytorch_scatter.git
          cd pytorch_scatter
          git checkout "$REF"
          git log --oneline -1

      - name: Build wheel
        run: |
          mkdir -p /tmp/wheels
          cd pytorch_scatter
          python -m pip wheel . --no-build-isolation -w /tmp/wheels/
          echo "--- Built files ---"
          ls -lh /tmp/wheels/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: torch-scatter-torch2.11.0-cu130-sm120
          path: /tmp/wheels/*.whl
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: torch-scatter-torch2.11.0-cu130
          name: "torch_scatter – torch 2.11.0 + CUDA 13.0 + Blackwell (sm_120)"
          body: |
            Custom torch_scatter Wheel für PSHuman / HF ZeroGPU Blackwell.

            | Komponente | Version |
            |---|---|
            | Python | 3.10 |
            | torch | 2.11.0+cu130 |
            | CUDA | 13.0 |
            | GPU-Architektur | **12.0 (Blackwell sm_120)** |
            | pytorch_scatter ref | `${{ github.event.inputs.scatter_ref || 'master' }}` |

            **Verwendung in requirements.txt:**
            ```
            https://github.com/Painter3000/pytorch3d-Wheel/releases/download/torch-scatter-torch2.11.0-cu130/torch_scatter-XXX-cp310-cp310-linux_x86_64.whl
            ```
          files: /tmp/wheels/*.whl
          draft: false
          prerelease: false
